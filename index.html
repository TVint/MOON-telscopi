<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>I Telescopi della Storia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="noise-overlay"></div>
  <div id="star-layer-1" class="star-layer"></div>
  <div id="star-layer-2" class="star-layer"></div>
  <div id="star-layer-3" class="star-layer twinkling"></div>
  
  <div class="comet comet-1"></div>
  <div class="comet comet-2"></div>

  <aside class="side-filters">
    <button class="filter-btn active" data-filter="all" style="--btn-color: #ffffff;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
      <span class="vertical-text">TUTTI</span>
    </button>
    <button class="filter-btn" data-filter="spaziali" style="--btn-color: var(--cat-spaziali);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.5a5.5 5.5 0 0 1 5.5 5.5c0 1.5-.5 2.8-1.3 3.9l1.8 10.1-6-3-6 3 1.8-10.1A5.5 5.5 0 0 1 6.5 8 5.5 5.5 0 0 1 12 2.5z"></path></svg>
      <span class="vertical-text">SPAZIALI</span>
    </button>
    <button class="filter-btn" data-filter="ottici" style="--btn-color: var(--cat-ottici);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      <span class="vertical-text">OTTICI</span>
    </button>
    <button class="filter-btn" data-filter="radio" style="--btn-color: var(--cat-radio);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"></path><path d="M8.5 4.5A11 11 0 0 0 3 12a11 11 0 0 0 5.5 7.5"></path><path d="M15.5 4.5A11 11 0 0 1 21 12a11 11 0 0 1-5.5 7.5"></path></svg>
      <span class="vertical-text">RADIO</span>
    </button>
    <button class="filter-btn" data-filter="gravitazionali" style="--btn-color: var(--cat-gravitazionali);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l3-9 5 18 3-9h5"></path></svg>
      <span class="vertical-text">GRAVITAZIONALI</span>
    </button>
  </aside>

  <div class="main-content-wrapper">
    <header>
      <div class="logo-container">
        <img src="img/logo.svg" alt="Mostra Telescopi">
      </div>
    </header>

    <main id="timeline" class="timeline-container">
      </main>
  </div>

  <nav class="bottom-bar" onclick="openMenuList()">
    <div class="bottom-bar-content">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </div>
  </nav>

  <div id="menu-overlay" class="fullscreen-menu">
    <button class="close-btn" onclick="closeMenuList(event)">&times;</button>
    <div class="menu-content">
      <ul id="telescope-list">
        </ul>
    </div>
  </div>

  <div id="detail-overlay" class="overlay">
    <div class="overlay-bg-stars"></div>
    <div class="overlay-header-bar" id="overlay-bar"></div>
    <button class="close-btn" onclick="closeDetail()">&times;</button>
    
    <div class="overlay-content">
      <div class="overlay-img-wrapper" id="overlay-img-wrap">
        <img id="modal-img" src="" alt="" class="overlay-img">
        <div class="modal-year-badge" id="modal-year"></div>
      </div>
      
      <div class="overlay-meta" id="modal-meta"></div>
      
      <article class="lang-section text-it">
        <h2 id="modal-title-it"></h2>
        <p id="modal-desc-it"></p>
        <div id="modal-extra-it" class="did-you-know"></div>
      </article>
      
      <hr class="divider">
      
      <article class="lang-section text-en">
        <h2 id="modal-title-en"></h2>
        <p id="modal-desc-en"></p>
        <div id="modal-extra-en" class="did-you-know"></div>
      </article>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
